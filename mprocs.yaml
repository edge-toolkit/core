---
procs:
  ws-server:
    cmd: [cargo, run, -p, et-ws-server]
    cwd: ./services/ws-server
    stop:
      send-keys: ["<C-c>"]
  openobserve:
    cmd: [mise, run, openobserve]
    stop:
      send-keys: ["<C-c>"]

  # This task going "DOWN" without error means the services are up.
  up-check:
    shell: "waitup --timeout 1m 127.0.0.1:5080 127.0.0.1:8443"

  open-o2:
    shell: open http://localhost:5080/
