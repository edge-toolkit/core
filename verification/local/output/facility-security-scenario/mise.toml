[tasks.generated-scenario]
depends = ["openobserve", "ws-server"]
description = "Run generated scenario for facility-security-scenario"

[tasks.open-o2]
description = "Open the OpenObserve UI"
run = "open http://localhost:5080/"

[tasks.openobserve]
alias = "o2"
dir = "../../../.."
run = """
docker run --rm --name openobserve -p 5080:5080 \
  --env-file config/o2.env \
  openobserve/openobserve:v0.70.3
"""

[tasks.ws-server]
description = "Run the WebSocket server"
dir = "../../../../services/ws-server"
run = '''
export MODULES_PATHS="\
  static,\
  ../ws-wasm-agent,\
  ../../data/model-modules,\
  ../ws-modules/face-detection,\
  ../ws-modules/har1,\
  $(mise where npm:onnxruntime-web)/lib/node_modules,\
  $(mise where npm:pyodide)/lib/node_modules"
cargo run
'''

[tasks.ws-server.env]
OTLP_AUTH_PASSWORD = "1234"
OTLP_AUTH_USERNAME = "root@example.com"
